<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Formulir Pendaftaran Praktikan</title>
  </head>
  <body>
    <form action="#" method="POST">
      <table>
        <tr>
          <td>NIM :</td>
          <td><input type="text" name="nim" /></td>
        </tr>
        <tr>
          <td>Nama :</td>
          <td><input type="text" name="nama" /></td>
        </tr>
        <tr>
          <td>Tgl Lahir (dd-mm-yyyy) :</td>
          <td><input type="date" name="tgl_lahir" /></td>
        </tr>
        <tr>
          <td>Jenis Kelamin :</td>
          <td>
            <input type="radio" name="jk" id="laki" value="Laki-Laki" />
            <label for="laki">Laki-Laki</label>
            <input type="radio" name="jk" id="perempuan" value="Perempuan" />
            <label for="perempuan">Perempuan</label>
          </td>
        </tr>
        <tr>
          <td>Alamat di Bandung :</td>
          <td><textarea name="alamat" rows="4" cols="30"></textarea></td>
        </tr>
        <tr>
          <td>Tinggal di :</td>
          <td>
            <select name="tinggal">
              <option value="">--pilih--</option>
              <option value="kos">Kos/kontrakan</option>
              <option value="saudara">Rumah saudara</option>
              <option value="ortu">Rumah orang tua</option>
            </select>
          </td>
        </tr>
        <tr>
          <td>Pilih 2 hobi yang paling disukai :</td>
          <td>
            <input type="checkbox" name="hobi[]" value="Science" />
            Science<br />
            <input type="checkbox" name="hobi[]" value="Technology" />
            Technology<br />
            <input type="checkbox" name="hobi[]" value="Art" /> Art<br />
            <input type="checkbox" name="hobi[]" value="Sport" /> Sport
          </td>
        </tr>
        <tr>
          <td colspan="2">
            <input type="submit" value="Submit" />
            <input type="reset" value="Reset" />
          </td>
        </tr>
      </table>
    </form>
  </body>
</html>
