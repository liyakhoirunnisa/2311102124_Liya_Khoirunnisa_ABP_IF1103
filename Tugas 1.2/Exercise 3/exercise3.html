<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 3 - Presisi Layout Kanan</title>
    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- CSS -->
    <link rel="stylesheet" href="exercise3.css" />
  </head>
  <body>
    <!-- Kontainer -->
    <div class="layout-container">
      <!-- Wrapper utama -->
      <div class="d-flex" style="gap: 20px;">
        <!-- Kolom kiri -->
        <div class="left-column d-flex flex-column">
          <!-- Logo -->
          <div
            class="box logo-box d-flex align-items-center justify-content-center"
          >
            Logo
          </div>
          <!-- Navigasi -->
          <div
            class="box nav-box d-flex align-items-center justify-content-center"
          >
            Navigasi
          </div>
        </div>

        <!-- Kolom kanan -->
        <div class="right-column d-flex flex-column flex-grow-1">
          <!-- Banner atas -->
          <div class="grey-box top-banner"></div>

          <!-- Garis tengah -->
          <div class="lined-box middle-lines">
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
          </div>

          <!-- Area nested -->
          <div class="d-flex nested-area" style="gap: 20px;">
            <!-- Garis tinggi -->
            <div class="lined-box tall-lines flex-grow-1">
              <div class="line"></div>
              <div class="line"></div>
              <div class="line"></div>
              <div class="line"></div>
              <div class="line"></div>
              <div class="line"></div>
              <div class="line"></div>
              <div class="line"></div>
              <div class="line"></div>
              <div class="line"></div>
              <div class="line"></div>
            </div>
            <!-- Kotak abu-abu -->
            <div class="grey-box inner-square"></div>
          </div>

          <!-- Garis bawah tebal -->
          <div class="thick-bottom-line"></div>
        </div>
      </div>
    </div>
  </body>
</html>
